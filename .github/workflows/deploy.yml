name: Deploy DEV

on:
  push:
    branches:
      - develop
    paths:
      - "infra/**"
      - "infra/dev/**"
      - "services/symphony-monolith/**"
      - "services/product-review-service/**"
      - "services/offers-service/**"
      - "integ-tests/**"
      - ".github/workflows/deploy.yml"
      - ".github/workflows/deploy-prod.yml"
      - ".github/workflows/deploy-offers-service.yml"

permissions:
  contents: write

env:
  PROJECT_ID: paw-2026-496213
  REGION: europe-central2
  REGISTRY: europe-central2-docker.pkg.dev
  REPOSITORY: mini-allegro
  IMAGE: mini-allegro
  SERVICE_DEV: mini-allegro-dev
  OFFERS_SERVICE_DEV: offers-service-dev
  DEV_DB_INSTANCE_NAME: mini-allegro-db-dev

jobs:
  validate-secrets:
    name: Validate required secrets (DEV)
    runs-on: ubuntu-latest

    steps:
      - name: Validate required secrets are set
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          DEV_DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
          APP_SECRET: ${{ secrets.APP_SECRET }}
        run: |
          missing=0

          if [ -z "$GCP_SA_KEY" ]; then
            echo "Missing required secret: GCP_SA_KEY"
            missing=1
          fi

          if [ -z "$TF_STATE_BUCKET" ]; then
            echo "Missing required secret: TF_STATE_BUCKET"
            missing=1
          fi

          if [ -z "$DEV_DATABASE_URL" ]; then
            echo "Missing required secret: DEV_DATABASE_URL"
            missing=1
          fi

          if [ -z "$APP_SECRET" ]; then
            echo "Missing required secret: APP_SECRET"
            missing=1
          fi

          if printf '%s' "$DEV_DATABASE_URL" | grep -Eq '(^|[?&])serverVersion=([&]|$)'; then
            echo "Invalid DEV_DATABASE_URL: serverVersion is empty"
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

  terraform-dev:
    name: Terraform apply (DEV infra)
    needs: validate-secrets
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Ensure Terraform state bucket exists
        run: |
          gcloud storage buckets describe gs://${{ secrets.TF_STATE_BUCKET }} --project=${{ env.PROJECT_ID }} >/dev/null 2>&1 || \
          gcloud storage buckets create gs://${{ secrets.TF_STATE_BUCKET }} --project=${{ env.PROJECT_ID }} --location=${{ env.REGION }}

      - name: Terraform init (remote state)
        working-directory: infra/dev
        run: |
          terraform init \
            -input=false \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="prefix=mini-allegro/dev"

      - name: Import existing resources (one-time)
        working-directory: infra/dev
        run: |
          # Import Cloud SQL instance if not already in state
          if ! terraform state show google_sql_database_instance.this 2>/dev/null; then
            terraform import google_sql_database_instance.this ${{ env.PROJECT_ID }}/${{ env.DEV_DB_INSTANCE_NAME }} || true
          fi
          # Import database
          if ! terraform state show google_sql_database.this 2>/dev/null; then
            terraform import google_sql_database.this ${{ env.PROJECT_ID }}/${{ env.DEV_DB_INSTANCE_NAME }}/mini_allegro_dev || true
          fi
          # Import database user
          if ! terraform state show google_sql_user.this 2>/dev/null; then
            terraform import google_sql_user.this ${{ env.PROJECT_ID }}/${{ env.DEV_DB_INSTANCE_NAME }}/app || true
          fi

      - name: Terraform apply (DEV)
        working-directory: infra/dev
        run: terraform apply -input=false -auto-approve

  build-dev:
    name: Build & Push Docker image (DEV tag)
    needs: terraform-dev
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Generate DEV image tag
        id: meta
        run: |
          IMAGE_TAG="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }}-dev"
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image (with cache)
        uses: docker/build-push-action@v6
        with:
          context: services/symphony-monolith
          file: services/symphony-monolith/docker/Dockerfile
          target: prod
          push: true
          tags: ${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-offers-dev:
    name: Deploy offers-service (DEV)
    needs: terraform-dev
    uses: ./.github/workflows/deploy-offers-service.yml
    with:
      environment: dev
      service_name: offers-service-dev
      image_tag_suffix: dev
      sha: ${{ github.sha }}
    secrets:
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}

  deploy-dev:
    name: Deploy to DEV
    needs: [build-dev, deploy-offers-dev]
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Prepare sanitized DATABASE_URL
        id: dburl
        env:
          DEV_DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
        run: |
          DB_URL="$DEV_DATABASE_URL"
          DB_URL="$(printf '%s' "$DB_URL" | sed -E 's/([?&])serverVersion=[^&]*(&|$)/\1\2/g; s/\?&/\?/g; s/&&+/&/g; s/[?&]$//')"

          if [ -z "$DB_URL" ]; then
            echo "Sanitized DATABASE_URL is empty"
            exit 1
          fi

          echo "::add-mask::$DB_URL"
          echo "value=$DB_URL" >> "$GITHUB_OUTPUT"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Cloud Run DEV
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_DEV }}
          region: ${{ env.REGION }}
          image: ${{ needs.build-dev.outputs.image_tag }}
          env_vars: |
            APP_ENV=dev
            DATABASE_URL=${{ steps.dburl.outputs.value }}
            APP_SECRET=${{ secrets.APP_SECRET }}
            OFFERS_SERVICE_URL=${{ needs.deploy-offers-dev.outputs.offers_service_url }}
            PRODUCT_REVIEW_SERVICE_URL=https://product-review-service-dev-sahzovzjgq-lm.a.run.app

      - name: DEV health-check (HTTP 200)
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_DEV }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/health")
          echo "DEV URL: $URL"
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed! Got HTTP $STATUS"
            exit 1
          fi

  integration-tests-dev:
    name: Integration tests (DEV)
    needs: deploy-dev
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        working-directory: services/symphony-monolith
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Resolve DEV URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_DEV }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "APP_BASE_URL=$URL" >> $GITHUB_ENV
          echo "Using DEV URL: $URL"

      - name: Wait for DEV health endpoint
        run: |
          HEALTH_URL="${APP_BASE_URL%/}/health"
          for i in {1..30}; do
            if curl -fsS "$HEALTH_URL" > /dev/null; then
              echo "Application is healthy: $HEALTH_URL"
              exit 0
            fi
            echo "Waiting for deployed app... ($i/30)"
            sleep 10
          done
          echo "Application did not become healthy in time: $HEALTH_URL"
          exit 1

      - name: Integration tests - offers (DEV)
        working-directory: services/symphony-monolith
        run: pytest ../../integ-tests/test_offers.py

      - name: Integration tests - users (DEV)
        working-directory: services/symphony-monolith
        run: pytest ../../integ-tests/test_users.py

      - name: Integration tests - products (DEV)
        working-directory: services/symphony-monolith
        run: pytest ../../integ-tests/test_products.py

      - name: Integration tests - product reviews (DEV)
        working-directory: services/symphony-monolith
        run: pytest ../../integ-tests/test_product_reviews.py

  promote-to-main:
    name: Auto-merge develop -> main
    needs:
      - integration-tests-dev
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Merge develop into main and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin main develop
          git checkout -B main origin/main
          git merge --no-ff --no-edit origin/develop
          git push origin main
