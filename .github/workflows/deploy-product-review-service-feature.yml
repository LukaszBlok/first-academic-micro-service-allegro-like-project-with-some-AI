name: Deploy product-review-service (feat/review-service)

on:
  push:
    branches:
      - feat/review-service
    paths:
      - "services/product-review-service/**"
      - "services/symphony-monolith/**"
      - "infra/product-review-service/**"
      - ".github/workflows/deploy-product-review-service-feature.yml"

env:
  PROJECT_ID: paw-2026-496213
  REGION: europe-central2
  REGISTRY: europe-central2-docker.pkg.dev
  REPOSITORY: mini-allegro
  IMAGE: product-review-service
  SERVICE_DEV: product-review-service-dev

jobs:
  build:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Generate image tag
        id: meta
        run: |
          IMAGE_TAG="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }}-feature"
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: services/product-review-service
          file: services/product-review-service/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  terraform:
    name: Terraform apply (product-review-service infra)
    needs: build
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Ensure Terraform state bucket exists
        run: |
          gcloud storage buckets describe gs://${{ secrets.TF_STATE_BUCKET }} --project=${{ env.PROJECT_ID }} >/dev/null 2>&1 || \
          gcloud storage buckets create gs://${{ secrets.TF_STATE_BUCKET }} --project=${{ env.PROJECT_ID }} --location=${{ env.REGION }}

      - name: Terraform init
        working-directory: infra/product-review-service
        run: |
          terraform init \
            -input=false \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="prefix=product-review-service/dev"

      - name: Terraform apply
        working-directory: infra/product-review-service
        run: |
          terraform apply \
            -input=false \
            -auto-approve \
            -var="image=${{ needs.build.outputs.image_tag }}" \
            -var="database_url=${{ secrets.DEV_DATABASE_URL }}"

  deploy:
    name: Deploy to Cloud Run DEV
    needs: [build, terraform]
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Cloud Run DEV
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_DEV }}
          region: ${{ env.REGION }}
          image: ${{ needs.build.outputs.image_tag }}

      - name: Health check GET /product-reviews
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_DEV }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "DEV URL: $URL"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/product-reviews")
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed! Got HTTP $STATUS"
            exit 1
          fi
          echo "product-review-service is healthy"
