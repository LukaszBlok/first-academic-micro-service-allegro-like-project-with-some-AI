name: Deploy PROD

on:
  push:
    branches:
      - main
    paths:
      - "infra/prod/**"
      - "services/symphony-monolith/**"
      - "services/offers-service/**"
      - "integ-tests/**"
      - ".github/workflows/deploy.yml"
      - ".github/workflows/deploy-prod.yml"
      - ".github/workflows/deploy-offers-service.yml"
  workflow_run:
    workflows:
      - Deploy DEV
    types:
      - completed
  workflow_dispatch:

env:
  PROJECT_ID: paw-2026-496213
  REGION: europe-central2
  REGISTRY: europe-central2-docker.pkg.dev
  REPOSITORY: mini-allegro
  IMAGE: mini-allegro
  SERVICE_PROD: mini-allegro-prod
  OFFERS_SERVICE_PROD: offers-service-prod

jobs:
  validate-secrets:
    name: Validate required secrets (PROD)
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Validate required secrets are set
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          PROD_DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          APP_SECRET: ${{ secrets.APP_SECRET }}
        run: |
          missing=0

          if [ -z "$GCP_SA_KEY" ]; then
            echo "Missing required secret: GCP_SA_KEY"
            missing=1
          fi

          if [ -z "$TF_STATE_BUCKET" ]; then
            echo "Missing required secret: TF_STATE_BUCKET"
            missing=1
          fi

          if [ -z "$PROD_DATABASE_URL" ]; then
            echo "Missing required secret: PROD_DATABASE_URL"
            missing=1
          fi

          if [ -z "$APP_SECRET" ]; then
            echo "Missing required secret: APP_SECRET"
            missing=1
          fi

          if printf '%s' "$PROD_DATABASE_URL" | grep -Eq '(^|[?&])serverVersion=([&]|$)'; then
            echo "Invalid PROD_DATABASE_URL: serverVersion is empty"
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

  terraform-prod:
    name: Terraform apply (PROD infra)
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    needs: validate-secrets
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Ensure Terraform state bucket exists
        run: |
          gcloud storage buckets describe gs://${{ secrets.TF_STATE_BUCKET }} --project=${{ env.PROJECT_ID }} >/dev/null 2>&1 || \
          gcloud storage buckets create gs://${{ secrets.TF_STATE_BUCKET }} --project=${{ env.PROJECT_ID }} --location=${{ env.REGION }}

      - name: Terraform init (remote state)
        working-directory: infra/prod
        run: |
          terraform init \
            -input=false \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="prefix=mini-allegro/prod"

      - name: Terraform apply (PROD)
        working-directory: infra/prod
        run: terraform apply -input=false -auto-approve

  build-prod:
    name: Build & Push Docker image (PROD tag)
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    needs: terraform-prod
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      sha: ${{ steps.source.outputs.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Resolve source SHA (main)
        id: source
        run: |
          SOURCE_SHA=$(git rev-parse HEAD)
          echo "sha=${SOURCE_SHA}" >> $GITHUB_OUTPUT

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Generate PROD image tag
        id: meta
        run: |
          IMAGE_TAG="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ steps.source.outputs.sha }}-prod"
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image (with cache)
        uses: docker/build-push-action@v6
        with:
          context: services/symphony-monolith
          file: services/symphony-monolith/docker/Dockerfile
          target: prod
          push: true
          tags: ${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-offers-prod:
    name: Deploy offers-service (PROD)
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    needs: terraform-prod
    uses: ./.github/workflows/deploy-offers-service.yml
    with:
      environment: prod
      service_name: offers-service-prod
      image_tag_suffix: prod
      sha: ${{ github.sha }}
    secrets:
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}

  deploy-prod:
    name: Deploy to PROD
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    needs: [build-prod, deploy-offers-prod]
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Prepare sanitized DATABASE_URL
        id: dburl
        env:
          PROD_DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: |
          DB_URL="$PROD_DATABASE_URL"
          DB_URL="$(printf '%s' "$DB_URL" | sed -E 's/([?&])serverVersion=[^&]*(&|$)/\1\2/g; s/\?&/\?/g; s/&&+/&/g; s/[?&]$//')"

          if [ -z "$DB_URL" ]; then
            echo "Sanitized DATABASE_URL is empty"
            exit 1
          fi

          echo "::add-mask::$DB_URL"
          echo "value=$DB_URL" >> "$GITHUB_OUTPUT"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Resolve PRODUCT_REVIEW_SERVICE_URL
        run: |
          REVIEW_URL=$(gcloud run services describe product-review-service-dev \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "PRODUCT_REVIEW_SERVICE_URL=$REVIEW_URL" >> $GITHUB_ENV

      - name: Deploy to Cloud Run PROD
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_PROD }}
          region: ${{ env.REGION }}
          image: ${{ needs.build-prod.outputs.image_tag }}
          env_vars: |
            APP_ENV=prod
            DATABASE_URL=${{ steps.dburl.outputs.value }}
            APP_SECRET=${{ secrets.APP_SECRET }}
            OFFERS_SERVICE_URL=${{ needs.deploy-offers-prod.outputs.offers_service_url }}
            PRODUCT_REVIEW_SERVICE_URL=${{ env.PRODUCT_REVIEW_SERVICE_URL }}

      - name: PROD health-check (HTTP 200)
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_PROD }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/health")
          echo "PROD URL: $URL"
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed! Got HTTP $STATUS"
            exit 1
          fi

  integration-tests-prod:
    name: Integration tests (PROD)
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    needs: deploy-prod
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        working-directory: services/symphony-monolith
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Resolve PROD URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_PROD }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "APP_BASE_URL=$URL" >> $GITHUB_ENV
          echo "Using PROD URL: $URL"

      - name: Wait for PROD health endpoint
        run: |
          HEALTH_URL="${APP_BASE_URL%/}/health"
          for i in {1..30}; do
            if curl -fsS "$HEALTH_URL" > /dev/null; then
              echo "Application is healthy: $HEALTH_URL"
              exit 0
            fi
            echo "Waiting for deployed app... ($i/30)"
            sleep 10
          done
          echo "Application did not become healthy in time: $HEALTH_URL"
          exit 1

      - name: Integration tests - offers (PROD)
        working-directory: services/symphony-monolith
        run: pytest ../../integ-tests/test_offers.py

      - name: Integration tests - users (PROD)
        working-directory: services/symphony-monolith
        run: pytest ../../integ-tests/test_users.py

      - name: Integration tests - products (PROD)
        working-directory: services/symphony-monolith
        run: pytest ../../integ-tests/test_products.py

      - name: Integration tests - product reviews (PROD)
        working-directory: services/symphony-monolith
        run: pytest ../../integ-tests/test_product_reviews.py
