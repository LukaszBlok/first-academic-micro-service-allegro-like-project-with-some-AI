name: CI

on:
  pull_request:
    branches:
      - develop
      - main
    paths:
      - "services/symphony-monolith/**"
      - "services/offers-service/**"
      - ".github/workflows/build.yml"
  workflow_dispatch:

jobs:
  build-image-check:
    name: Build Docker image (CI)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production image (with cache)
        uses: docker/build-push-action@v6
        with:
          context: services/symphony-monolith
          file: services/symphony-monolith/docker/Dockerfile
          target: prod
          push: false
          tags: mini-allegro:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test-offers-service:
    name: Run offers-service unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - name: Run tests
        working-directory: services/offers-service
        run: go test ./... -v

  build-offers-image-check:
    name: Build offers-service Docker image (CI)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build offers-service image
        uses: docker/build-push-action@v6
        with:
          context: services/offers-service
          file: services/offers-service/Dockerfile
          push: false
          tags: offers-service:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
