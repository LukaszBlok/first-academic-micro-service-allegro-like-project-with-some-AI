name: Deploy purchase-service DEV

on:
  push:
    branches:
      - develop
    paths:
      - "services/purchase-service/**"
      - "infra/purchase-service.tf"
      - ".github/workflows/deploy-purchase-service.yml"
  pull_request:
    branches:
      - develop
    paths:
      - "services/purchase-service/**"
      - "infra/purchase-service.tf"
      - ".github/workflows/deploy-purchase-service.yml"

env:
  PROJECT_ID: paw-2026-496213
  REGION: europe-central2
  REGISTRY: europe-central2-docker.pkg.dev
  REPOSITORY: mini-allegro
  IMAGE: purchase-service
  SERVICE_DEV: purchase-service-dev

jobs:
  validate-secrets:
    name: Validate required secrets
    runs-on: ubuntu-latest

    steps:
      - name: Validate required secrets are set
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          if [ -z "$GCP_SA_KEY" ]; then
            echo "Missing required secret: GCP_SA_KEY"
            exit 1
          fi

  build:
    name: Build and push Docker image
    needs: validate-secrets
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Generate image tag
        id: meta
        run: |
          IMAGE_TAG="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }}-dev"
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: services/purchase-service
          file: services/purchase-service/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Cloud Run DEV
    needs: build
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Cloud Run DEV
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_DEV }}
          region: ${{ env.REGION }}
          image: ${{ needs.build.outputs.image_tag }}
          flags: --allow-unauthenticated

      - name: Health check GET /health
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_DEV }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "DEV URL: $URL"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/health")
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed! Got HTTP $STATUS"
            exit 1
          fi
          echo "purchase-service is healthy"
