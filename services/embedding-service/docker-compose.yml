services:
  db:
    image: pgvector/pgvector:pg16
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U embedding -d embedding"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: embedding
      POSTGRES_USER: embedding
      POSTGRES_PASSWORD: embedding
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  app:
    build: .
    ports:
      - "8084:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: "postgresql://embedding:embedding@db:5432/embedding"
    depends_on:
      db:
        condition: service_healthy

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  pgdata:
  qdrant_data:
